name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ci-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Schedule auto-merge
        run: |
          curl -sf -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge" \
            -H "Authorization: token ${{ secrets.GIT_PUSH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "do": "merge",
              "merge_when_checks_succeed": true,
              "delete_branch_after_merge": true
            }'
          echo "Auto-merge scheduled for PR #${{ github.event.pull_request.number }}"
