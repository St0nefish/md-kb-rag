name: Build Container Image

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebase onto master
        if: github.event_name == 'pull_request'
        run: |
          git config user.email "ci@stonefish.tech"
          git config user.name "CI"
          git fetch origin master
          git rebase origin/master

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        run: |
          echo "${{ secrets.PACKAGE_REGISTRY_TOKEN }}" | docker login git.stonefish.tech -u ${{ github.actor }} --password-stdin

      - name: Set up builder
        run: |
          docker buildx create --name ci-builder --driver docker-container --use 2>/dev/null || docker buildx use ci-builder

      - name: Build and push (sha tag)
        run: |
          docker buildx build \
            --builder ci-builder \
            --push \
            --cache-from type=registry,ref=git.stonefish.tech/${{ github.repository }}:buildcache \
            --cache-to type=registry,ref=git.stonefish.tech/${{ github.repository }}:buildcache,mode=max \
            --tag git.stonefish.tech/${{ github.repository }}:${{ steps.version.outputs.short_sha }} \
            --file ./Dockerfile \
            .

  release:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute tags
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        run: |
          echo "${{ secrets.PACKAGE_REGISTRY_TOKEN }}" | docker login git.stonefish.tech -u ${{ github.actor }} --password-stdin

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            --tag git.stonefish.tech/${{ github.repository }}:latest \
            git.stonefish.tech/${{ github.repository }}:${{ steps.version.outputs.short_sha }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: Compute sha tag
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Delete branch image from registry
        if: github.ref != 'refs/heads/master'
        run: |
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          curl -s -X DELETE \
            -H "Authorization: token ${{ secrets.PACKAGE_REGISTRY_TOKEN }}" \
            "https://git.stonefish.tech/api/v1/packages/${REPO_OWNER}/container/${REPO_NAME}/${{ steps.version.outputs.short_sha }}"
