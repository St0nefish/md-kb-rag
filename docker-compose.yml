services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"   # REST API (debugging only)
      - "127.0.0.1:6334:6334"   # gRPC (used by kb-rag)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  embeddings:
    # CPU image — works everywhere, no GPU drivers needed.
    # Pin to a build tag (e.g. server-b8233) for reproducibility.
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    volumes:
      - ${MODEL_PATH:-./data/models}:/models:ro
    command: >
      --model /models/${MODEL_FILE:-model.gguf}
      --host 0.0.0.0 --port 8080
      --embeddings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    # -------------------------------------------------------------------------
    # GPU BACKENDS — uncomment ONE block below to replace the CPU default above.
    # Each block overrides image, command, and adds device access.
    # Pin tags for reproducibility (e.g. server-cuda12-b8233).
    # -------------------------------------------------------------------------

    ## --- NVIDIA CUDA ---
    # image: ghcr.io/ggml-org/llama.cpp:server-cuda12
    # command: >
    #   --model /models/${MODEL_FILE:-model.gguf}
    #   --host 0.0.0.0 --port 8080
    #   --embeddings -ngl 999
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    ## --- AMD ROCm ---
    # image: ghcr.io/ggml-org/llama.cpp:server-rocm
    # command: >
    #   --model /models/${MODEL_FILE:-model.gguf}
    #   --host 0.0.0.0 --port 8080
    #   --embeddings -ngl 999
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri

    ## --- AMD Vulkan ---
    # image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    # command: >
    #   --model /models/${MODEL_FILE:-model.gguf}
    #   --host 0.0.0.0 --port 8080
    #   --embeddings -ngl 999
    # devices:
    #   - /dev/dri:/dev/dri

  kb-rag:
    build: .
    restart: unless-stopped
    # user: "1000:1000"  # recommended: run as non-root
    volumes:
      - ${KB_PATH:-./data/repo}:/data:rw
      - ./data/state:/app/data:rw
      # Optional: mount config.yaml for overrides beyond env vars
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      - EMBEDDING_BASE_URL=http://embeddings:8080/v1
      - EMBEDDING_MODEL=nomic-embed-text-v2-moe
      - EMBEDDING_VECTOR_SIZE=768
      - QDRANT_URL=http://qdrant:6334
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - GIT_PULL_TOKEN=${GIT_PULL_TOKEN:-}
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN:-}
      - HOME=/tmp
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "${MCP_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "md-kb-rag", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
