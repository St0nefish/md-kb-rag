name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Determine which jobs need to run based on changed files
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - "src/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - "Dockerfile"
              - "docker-compose.yml"
              - "migrations/**"
              - ".github/workflows/ci.yml"

  test:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Rebase onto master
        run: |
          git config user.email "ci@stonefish.tech"
          git config user.name "CI"
          git fetch origin master
          git rebase origin/master

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Audit dependencies
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cargo-audit --no-confirm
          cargo audit

      - name: Compute version
        id: version
        run: |
          # Use PR branch head SHA so release.yml can find this image via headRefOid
          FULL_SHA="${{ github.event.pull_request.head.sha }}"
          echo "short_sha=sha-${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up builder
        run: |
          docker buildx create --name ci-builder --driver docker-container --use 2>/dev/null || docker buildx use ci-builder

      - name: Build and push (sha tag)
        run: |
          docker buildx build \
            --builder ci-builder \
            --push \
            --cache-from type=registry,ref=${{ steps.image.outputs.name }}:buildcache \
            --cache-to type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max \
            --tag ${{ steps.image.outputs.name }}:${{ steps.version.outputs.short_sha }} \
            --file ./Dockerfile \
            .

  # Gate job for branch protection — set "ci-pass" as the required status check.
  # Passes when test succeeds or was skipped (doc-only changes).
  ci-pass:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.test.result }}" =~ ^(success|skipped)$ ]]; then
            echo "CI passed (test: ${{ needs.test.result }})"
          else
            echo "CI failed (test: ${{ needs.test.result }})"
            exit 1
          fi
