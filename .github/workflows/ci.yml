name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Rebase onto master
        run: |
          git config user.email "ci@stonefish.tech"
          git config user.name "CI"
          git fetch origin master
          git rebase origin/master

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Audit dependencies
        run: |
          cargo install cargo-audit --locked --no-default-features
          cargo audit

      - name: Compute version
        id: version
        run: |
          # Use PR branch head SHA so release.yml can find this image via headRefOid
          FULL_SHA="${{ github.event.pull_request.head.sha }}"
          echo "short_sha=sha-${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up builder
        run: |
          docker buildx create --name ci-builder --driver docker-container --use 2>/dev/null || docker buildx use ci-builder

      - name: Build and push (sha tag)
        run: |
          docker buildx build \
            --builder ci-builder \
            --push \
            --cache-from type=registry,ref=${{ steps.image.outputs.name }}:buildcache \
            --cache-to type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max \
            --tag ${{ steps.image.outputs.name }}:${{ steps.version.outputs.short_sha }} \
            --file ./Dockerfile \
            .
